<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrooveBot</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f2eb; --surface: #efeae0; --card: #ffffff; --border: #d8d2c4;
    --accent: #1a1a1a; --accent-soft: #3d3d3d; --highlight: #c8f064;
    --highlight-dark: #a8d844; --text: #1a1a1a; --muted: #7a7570;
    --user-bg: #1a1a1a; --user-text: #f5f2eb; --bot-bg: #ffffff; --error: #e84040;
  }
  html, body { height: 100%; }
  body { font-family: 'Instrument Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 0 32px; height: 60px; background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .logo { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
  .logo span { display: inline-block; background: var(--highlight); color: var(--text); padding: 1px 7px; border-radius: 4px; margin-left: 4px; font-size: 13px; font-weight: 600; vertical-align: middle; }
  .status { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted); font-family: 'Syne', sans-serif; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #4caf7d; box-shadow: 0 0 0 2px rgba(76,175,125,0.2); transition: background 0.3s; }
  .status-dot.busy { background: var(--highlight-dark); box-shadow: 0 0 0 2px rgba(168,216,68,0.25); animation: blink 1s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .chat-wrap { flex: 1; overflow-y: auto; padding: 32px; display: flex; flex-direction: column; gap: 24px; scroll-behavior: smooth; }
  .chat-wrap::-webkit-scrollbar { width: 5px; }
  .chat-wrap::-webkit-scrollbar-track { background: transparent; }
  .chat-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .empty-state { margin: auto; text-align: center; max-width: 380px; animation: fadeUp 0.5s ease both; }
  .empty-icon { width: 56px; height: 56px; background: var(--highlight); border-radius: 16px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 26px; }
  .empty-state h2 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .empty-state p { font-size: 14px; color: var(--muted); line-height: 1.6; }
  .message { display: flex; gap: 12px; max-width: 720px; animation: fadeUp 0.3s ease both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }
  .message.bot  { align-self: flex-start; }
  .avatar { width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; margin-top: 2px; }
  .user .avatar { background: var(--user-bg); color: var(--user-text); }
  .bot  .avatar { background: var(--highlight); color: var(--text); }
  .bubble { padding: 13px 17px; border-radius: 14px; font-size: 14px; line-height: 1.65; }
  .user .bubble { background: var(--user-bg); color: var(--user-text); border-radius: 14px 4px 14px 14px; }
  .bot .bubble { background: var(--bot-bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px 14px 14px 14px; white-space: pre-wrap; }
  .bot .bubble.error { border-color: rgba(232,64,64,0.3); background: rgba(232,64,64,0.05); color: var(--error); }
  .typing { display: none; align-self: flex-start; align-items: center; gap: 12px; }
  .typing.visible { display: flex; }
  .typing-bubble { background: var(--bot-bg); border: 1px solid var(--border); border-radius: 4px 14px 14px 14px; padding: 14px 18px; display: flex; gap: 5px; align-items: center; }
  .typing-bubble span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: dots 1.2s ease-in-out infinite; }
  .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dots { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-5px);opacity:1} }
  .input-bar { flex-shrink: 0; padding: 16px 32px 24px; background: var(--bg); border-top: 1px solid var(--border); }
  .input-row { display: flex; gap: 10px; align-items: flex-end; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 10px 10px 10px 18px; transition: border-color 0.2s; }
  .input-row:focus-within { border-color: var(--accent); }
  textarea { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: 'Instrument Sans', sans-serif; font-size: 14px; line-height: 1.6; resize: none; min-height: 24px; max-height: 140px; }
  textarea::placeholder { color: var(--muted); }
  #sendBtn { width: 38px; height: 38px; border-radius: 10px; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s, transform 0.15s; }
  #sendBtn:hover:not(:disabled) { background: var(--accent-soft); transform: scale(1.05); }
  #sendBtn:active:not(:disabled) { transform: scale(0.97); }
  #sendBtn:disabled { opacity: 0.35; cursor: not-allowed; }
  #sendBtn svg { width: 16px; height: 16px; }
  .hint { font-size: 11px; color: var(--muted); margin-top: 8px; padding-left: 4px; }
</style>
</head>
<body>

<header>
  <div class="logo">GrooveBot <span>AI</span></div>
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Ready</span>
  </div>
</header>

<div class="chat-wrap" id="chat">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">🎵</div>
    <h2>Hello, friend! What are you feelin'?</h2>
    <p>Describe your mood and I'll find the perfect songs for you.</p>
  </div>
</div>

<div class="input-bar">
  <div class="input-row">
    <textarea id="input" placeholder="Describe your mood… e.g. 'chill late night vibes'" rows="1"></textarea>
    <button id="sendBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="#f5f2eb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <p class="hint">Enter to send · Shift+Enter for new line</p>
</div>

<script>
  const API_URL = "http://localhost:5000/generate"; // matches app.py

  const chat      = document.getElementById('chat');
  const input     = document.getElementById('input');
  const sendBtn   = document.getElementById('sendBtn');
  const statusDot = document.getElementById('statusDot');
  const statusTxt = document.getElementById('statusText');
  let   loading   = false;

  function setLoading(on) {
    loading = on;
    sendBtn.disabled = on;
    statusDot.classList.toggle('busy', on);
    statusTxt.textContent = on ? 'Finding songs…' : 'Ready';
    toggleTyping(on);
  }

  function removeEmpty() {
    const e = document.getElementById('emptyState');
    if (e) e.remove();
  }

  function addMessage(role, text, isError = false) {
    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;
    const av = document.createElement('div');
    av.className = 'avatar';
    av.textContent = role === 'user' ? 'You' : 'GB';
    const bubble = document.createElement('div');
    bubble.className = 'bubble' + (isError ? ' error' : '');
    bubble.textContent = text;
    const inner = document.createElement('div');
    inner.appendChild(bubble);
    wrap.appendChild(av);
    wrap.appendChild(inner);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  }

  function toggleTyping(show) {
    let t = document.getElementById('typingRow');
    if (!t) {
      t = document.createElement('div');
      t.id = 'typingRow';
      t.className = 'typing';
      t.innerHTML = `<div class="avatar bot" style="background:var(--highlight);color:var(--text);width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;">GB</div><div class="typing-bubble"><span></span><span></span><span></span></div>`;
      chat.appendChild(t);
    }
    t.className = show ? 'typing visible' : 'typing';
    if (show) chat.scrollTop = chat.scrollHeight;
  }

  async function send() {
    const text = input.value.trim();
    if (!text || loading) return;

    removeEmpty();
    addMessage('user', text);
    input.value = '';
    input.style.height = 'auto';
    setLoading(true);

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: text })  // matches what app.py expects
      });

      if (!res.ok) throw new Error(`Server error: ${res.status}`);

      const data = await res.json();
      const reply = data.result ?? data.response ?? data.output ?? JSON.stringify(data);

      toggleTyping(false);
      addMessage('bot', reply);

    } catch (err) {
      toggleTyping(false);
      addMessage('bot', `Error: ${err.message}`, true);
    }

    setLoading(false);
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  });
</script>

</body>
</html>
